server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

app:
  rabbitmq:
    exchange: booking-topic-exchange
    queue: notification-queue
    binding-key: booking.created        

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
